# This is a Declarative Automation Bundle definition for Teksystems.Walkthrough.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: Teksystems.Walkthrough

resources:
  jobs:
    data_generation_pipeline:
      name: Data Generation Pipeline
      description: Generate sample payment and fraud data for medallion architecture
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ./bundle/python_pipelines/data_generation_pipeline.py
          max_retries: 1
          timeout_seconds: 3600
      
    sql_transformation_pipeline:
      name: SQL Transformation Pipeline
      description: Transform raw data to silver and gold layers
      tasks:
        - task_key: transform_data
          notebook_task:
            notebook_path: ./bundle/python_pipelines/sql_transformation_pipeline.py
          max_retries: 1
          timeout_seconds: 3600

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-05e93822-e87a.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # staging:
  #   mode: production
  #   workspace:
  #     host: https://dbc-staging.cloud.databricks.com
  #
  # prod:
  #   mode: production
  #   workspace:
  #     host: https://dbc-production.cloud.databricks.com
