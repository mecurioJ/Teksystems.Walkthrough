# This is a Declarative Automation Bundle definition for Teksystems.Walkthrough.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: Teksystems.Walkthrough

resources:
  jobs:
    payment_gateway_job:
      name: Payment Gateway Processing Job
      tasks:
        - task_key: process_payments
          description: Process payments with fraud detection
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
          libraries:
            - whl: ./bundle/python/teksystems_walkthrough-0.1.0-py3-none-any.whl
          python_wheel_task:
            package_name: teksystems_walkthrough
            entry_point: main
            parameters: []

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-05e93822-e87a.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # staging:
  #   mode: production
  #   workspace:
  #     host: https://dbc-staging.cloud.databricks.com
  #
  # prod:
  #   mode: production
  #   workspace:
  #     host: https://dbc-production.cloud.databricks.com
